[pytest]
# Pytest configuration for the Danish Stock Exchange POC

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage options
addopts =
    --verbose
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=html
    --cov-report=xml
    --cov-report=term-missing

# Markers for categorizing tests
markers =
    data: Tests for data generation module
    api: Tests for FastAPI endpoints
    unit: Unit tests
    integration: Integration tests
